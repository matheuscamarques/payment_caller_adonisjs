name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run typecheck
        run: npm run typecheck

      - name: Run build
        run: npm run build

      - name: Run tests
        env:
          NODE_ENV: test
          PORT: 3333
          HOST: localhost
          LOG_LEVEL: info
          APP_KEY: averylongandsecureappkeyforgithubactions32chars
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_USER: root
          DB_PASSWORD: root
          DB_DATABASE: app
        run: npm run test
