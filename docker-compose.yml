services:
  postgres:
    image: postgres:16-alpine
    container_name: payments_postgres
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: app
    ports:
      - '5432:5432'
    volumes:
      - payments_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U root -d app']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  payments_pgdata:
